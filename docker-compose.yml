services:
  postgres:
    image: postgres:16-alpine
    container_name: ouvidoria-postgres
    environment:
      POSTGRES_DB: ouvidoria
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - ouvidoria-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ouvidoria']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  ouvidoria-postgres-data:
