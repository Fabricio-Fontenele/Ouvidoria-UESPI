services:
  postgres:
    image: postgres:16-alpine
    container_name: ouvidoria-postgres
    environment:
      POSTGRES_DB: ouvidoria
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - ouvidoria-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ouvidoria']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  ai-postgres:
    image: pgvector/pgvector:pg17
    container_name: ouvidoria-ai-postgres
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - ouvidoria-ai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d rag']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  ai-bootstrap:
    image: pgvector/pgvector:pg17
    container_name: ouvidoria-ai-bootstrap
    depends_on:
      ai-postgres:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command: >
      PGPASSWORD=postgres
      psql "postgresql://postgres@ai-postgres:5432/rag" -v ON_ERROR_STOP=1
      -c "CREATE EXTENSION IF NOT EXISTS vector;"
    restart: 'no'

  ai-api:
    build:
      context: .
      dockerfile: ai-api/Dockerfile
    container_name: ouvidoria-ai-api
    depends_on:
      ai-postgres:
        condition: service_healthy
      ai-bootstrap:
        condition: service_completed_successfully
    env_file:
      - ./ai-api/.env
    environment:
      HOST: '0.0.0.0'
      PORT: '4000'
      DATABASE_URL: 'postgresql://postgres:postgres@ai-postgres:5432/rag'
    ports:
      - '4000:4000'
    volumes:
      - ./ai-api:/app/ai-api
      - ai-api-node-modules:/app/ai-api/node_modules
      - ai-api-root-node-modules:/app/node_modules
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ouvidoria-backend
    depends_on:
      postgres:
        condition: service_healthy
      ai-api:
        condition: service_started
    env_file:
      - ./.env
    environment:
      HOST: '0.0.0.0'
      PORT: '3333'
      DATABASE_URL: 'postgresql://postgres:postgres@postgres:5432/ouvidoria?schema=public'
      AI_GATEWAY_PROVIDER: 'http'
      AI_SERVICE_BASE_URL: 'http://ai-api:4000'
    ports:
      - '3333:3333'
    volumes:
      - .:/app
      - backend-node-modules:/app/node_modules
      - backend-ai-node-modules:/app/ai-api/node_modules
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ouvidoria-web
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_GUARA_CHAT_ENDPOINT: '${VITE_GUARA_CHAT_ENDPOINT:-http://localhost:3333/api/ai/chat}'
    ports:
      - '5173:5173'
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules
    restart: unless-stopped

volumes:
  ouvidoria-postgres-data:
  ouvidoria-ai-postgres-data:
  backend-node-modules:
  backend-ai-node-modules:
  ai-api-node-modules:
  ai-api-root-node-modules:
  web-node-modules:
